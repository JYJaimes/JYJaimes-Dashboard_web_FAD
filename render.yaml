services:
  - type: web
    name: dashboard-randomforest-probabilidad
    env: python
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install --only-binary=:all: -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DB
        value: defaultdb
      - key: MYSQL_SSL_MODE
        value: REQUIRED
      - key: RF_LIMIT
        value: 5000
